<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Tetra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

    <%- include('components/header.ejs', { rootPath: '../', current: 'news' }) %>

    <main>
        <div class="container">
            <section class="page-hero">
                <h1 class="page-title">News</h1>
                <p class="page-desc">
                    活動報告、イベント情報、Tetraからのお知らせ。<br>
                    最新の情報をチェックしてください。
                </p>
            </section>

            <section class="news-archive-section">
                <!-- News List -->
                <ul class="news-archive-list" id="news-archive-list">
                    <!-- Dynamic Content -->
                </ul>
            </section>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const list = document.getElementById('news-archive-list');
            if (!list) return;

            try {
                const res = await fetch('./news_index.json?t=' + Date.now());
                if (!res.ok) throw new Error('Failed to fetch news index');
                const newsItems = await res.json();

                const sortedNews = newsItems.sort((a, b) => new Date(b.date) - new Date(a.date));
            const now = new Date();

            sortedNews.forEach(item => {
                // Check publication time
                if (item.publishAt) {
                    const publishDate = new Date(item.publishAt);
                    if (now < publishDate) return; // Skip future items
                }

                const li = document.createElement('li');
                li.className = 'news-archive-item';

                // Adjust URL for subdirectory context (we are in /news/)
                // Data comes as './news/article.html...' (optimized for Root)
                // We need to convert it to work from here.
                // Existing logic: prepend '.' to make it '../'
                let adjustedUrl = item.url;

                if (!adjustedUrl && item.id) {
                    // If no URL but ID exists, construct local path
                    adjustedUrl = `./article.html?id=${item.id}`;
                } else if (adjustedUrl && adjustedUrl.startsWith('./')) {
                    // Convert './news/...' to '../news/...'
                    adjustedUrl = '.' + adjustedUrl;
                }

                li.innerHTML = `
                        <a href="${adjustedUrl}" class="news-link">
                            <span class="news-date">${item.date}</span>
                            <span class="news-label ${item.type}">${item.label}</span>
                            <span class="news-title">${item.title}</span>
                            <span class="news-arrow">→</span>
                        </a>
                    `;
                list.appendChild(li);
            });
            } catch (error) {
                console.error('Failed to load news archive:', error);
            }
        });
    </script>
    </section>
    </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <!-- Mobile Navigation Overlay -->
    <%- include('components/mobile-nav.ejs', { rootPath: '../' }) %>

    <%- include('components/footer.ejs', { rootPath: '../' }) %>

    <script src="../script/script.js" type="module"></script>
</body>

</html>
